name: setup-env

description: Setup CI environment

inputs:
  env: 
    required: true
    default: dev
    description: Environment to setup

  registry:
    required: false
    description: Registry to use for authentication
  username:
    required: false
    description: Username to use for authentication
  password:
    required: false
    description: Password to use for authentication

runs:
  using: 'composite'
  steps:
    - name: Docker login
      shell: bash
      run: |
        if [ -n "${{ inputs.registry }}" ]; then
          docker login ${{ inputs.registry }} -u ${{ inputs.username }} -p ${{ inputs.password }}
        fi

    - name: Install tools
      shell: bash
      run: |
        apt-get update && apt-get install -y curl ca-certificates
      