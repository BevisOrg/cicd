name: Deploy Docker
description: Deploy Docker

inputs:
  env:
    required: false
    default: dev
    description: Environment to setup
  registry_username:
    required: false

runs:
  using: composite
  steps:
    - name: Run App
      shell: bash
      run: |
        IMAGE="${{ inputs.registry_username }}/${{ inputs.service_name }}:${{ github.sha }}"
        CONTAINER="${{ inputs.service_name }}"
        
        export IMAGE=$IMAGE
        export CONTAINER=$CONTAINER
        
        cd cicd/services/$SERVICE
        docker compose up -d --force-recreate
