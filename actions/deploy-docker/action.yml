name: Deploy Docker
description: Deploy Docker

inputs:
  env:
    required: false
    default: dev
    description: Environment to setup
  registry_username:
    required: false
  service_name:
    required: true

runs:
  using: composite
  steps:
    - name: Run App
      shell: bash
      run: |
        IMAGE="${{ inputs.registry_username }}/${{ inputs.service_name }}:${{ github.sha }}"
        CONTAINER="${{ inputs.service_name }}"
        
        echo "IMAGE=$IMAGE" > .env
        echo "CONTAINER=$CONTAINER" >> .env
        echo "PROFILE=$PROFILE" >> .env
        
        cd cicd/services/${{ inputs.service_name }}
        docker compose up -d --force-recreate
