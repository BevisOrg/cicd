name: Deploy Node App
description: Build and push Docker image for a Node application

inputs:
  registry:
    description: "Image prefix without scheme (e.g. ghcr.io/myorg). Same value as used for docker login host/path."
    required: true
  image:
    description: "Image name (appended after registry prefix). Use org/repo for GHCR if prefix is only hostname."
    required: true
  tag:
    description: "Image tag"
    required: true
  working_dir:
    description: "Docker build context directory"
    required: false
    default: "app"
  dockerfile:
    description: "Path to Dockerfile relative to working_dir"
    required: false
    default: "Dockerfile"

runs:
  using: composite
  steps:
    - name: Docker build and push
      shell: bash
      working-directory: ${{ inputs.working_dir }}
      run: |
        set -euo pipefail
        REGISTRY="${{ inputs.registry }}"
        REGISTRY="${REGISTRY#https://}"
        REGISTRY="${REGISTRY#http://}"
        REGISTRY="${REGISTRY%/}"
        IMAGE=$(echo "${REGISTRY}/${{ inputs.image }}:${{ inputs.tag }}" | tr '[:upper:]' '[:lower:]')
        docker build -f "${{ inputs.dockerfile }}" -t "$IMAGE" .
        docker push "$IMAGE"
