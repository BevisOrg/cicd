suite: test configmap
templates:
  - configmap.yaml
tests:
  - it: should not set configMapLabels
    release:
      name: hello-gitlab
    chart:
      version: 1.0.1
    template: configmap.yaml
    asserts:
      - matchSnapshot:
          path: metadata
      - equal:
          path: metadata.labels
          value:
            app: hello-gitlab-gitlab-runner
            chart: gitlab-runner-1.0.1
            heritage: Helm
            release: hello-gitlab


  - it: should set configMapLabels without template variables
    set:
      configMapLabels:
        owner.team: my-team
        gitlab.com: reserved
    template: configmap.yaml
    asserts:
      - equal:
          path: metadata.labels["owner.team"]
          value: my-team
      - equal:
          path: metadata.labels["gitlab.com"]
          value: reserved

  - it: should set configMapLabels with template variables
    set:
      team: gitlab-team
      tag: finops.io
      configMapLabels:
        owner.team: "{{ .Values.team }}"
        tags.{{ .Values.tag }}/env: "sandbox"
        tags.k8s.io/service: gitlab-runner
    template: configmap.yaml
    asserts:
      - equal:
          path: metadata.labels["owner.team"]
          value: gitlab-team
      - equal:
          path: metadata.labels["tags.finops.io/env"]
          value: sandbox
      - equal:
          path: metadata.labels["tags.k8s.io/service"]
          value: gitlab-runner

  - it: should export cache credentials by default
    template: configmap.yaml
    asserts:
      - matchRegex:
          path: data.entrypoint
          pattern: 'export CACHE_S3_ACCESS_KEY'
      - matchRegex:
          path: data.entrypoint
          pattern: 'export GOOGLE_APPLICATION_CREDENTIALS'
      - matchRegex:
          path: data.entrypoint
          pattern: 'export CACHE_GCS_ACCESS_ID'
      - matchRegex:
          path: data.entrypoint
          pattern: 'export CACHE_AZURE_ACCOUNT_NAME'

  - it: should not export cache credentials when disableGlobalCredentialsExport is true
    set:
      runners.cache.disableGlobalCredentialsExport: true
    template: configmap.yaml
    asserts:
      - notMatchRegex:
          path: data.entrypoint
          pattern: 'export CACHE_S3_ACCESS_KEY'
      - notMatchRegex:
          path: data.entrypoint
          pattern: 'export GOOGLE_APPLICATION_CREDENTIALS'
      - notMatchRegex:
          path: data.entrypoint
          pattern: 'export CACHE_GCS_ACCESS_ID'
      - notMatchRegex:
          path: data.entrypoint
          pattern: 'export CACHE_AZURE_ACCOUNT_NAME'

  - it: should export cache credentials when disableGlobalCredentialsExport is false
    set:
      runners.cache.disableGlobalCredentialsExport: false
    template: configmap.yaml
    asserts:
      - matchRegex:
          path: data.entrypoint
          pattern: 'export CACHE_S3_ACCESS_KEY'
      - matchRegex:
          path: data.entrypoint
          pattern: 'export GOOGLE_APPLICATION_CREDENTIALS'
      - matchRegex:
          path: data.entrypoint
          pattern: 'export CACHE_GCS_ACCESS_ID'
      - matchRegex:
          path: data.entrypoint
          pattern: 'export CACHE_AZURE_ACCOUNT_NAME'
