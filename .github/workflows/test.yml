name: Test Runner

on:
  workflow_call:

jobs:
  test-runner:
    runs-on: self-hosted

    steps:
      - name: Print hello
        run: echo "Runner is working 🚀"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout cicd
        uses: actions/checkout@v6
        with: 
          repository: BevisOrg/cicd
          path: cicd

      - name: Debug file structure
        run: ls -R

      - name: Call action
        uses: ./cicd/builds
